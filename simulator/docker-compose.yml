# ================================================================
# EMS Edge Simulator - Docker Compose
# ================================================================

networks:
  ems_default:
    external: false

services:

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    command: >
      sh -c "echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
             echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
             /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - ems_default

  mqtt-logger:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-logger
    restart: always
    depends_on:
      mqtt-broker:
        condition: service_healthy
    command: mosquitto_sub -h mqtt-broker -t "#" -v
    networks:
      - ems_default

  simulator-manager:
    build:
      context: ./simulator-manager
      dockerfile: Dockerfile
    image: simulator-manager:latest
    container_name: simulator-manager
    hostname: simulator-manager
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./simulator-manager/edges:/app/edges
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8080
      - DOCKER_NETWORK=ems_default
      - SOLAR_IMAGE=solar-simulator:latest
      - DIESEL_IMAGE=diesel-simulator:latest
      - ESS_IMAGE=ess-simulator:latest
      - LOAD_IMAGE=load-simulator:latest
    networks:
      - ems_default

