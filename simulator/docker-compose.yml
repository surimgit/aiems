# ================================================================
# EMS Edge Simulator - Docker Compose
# ================================================================

networks:
  ems_default:
    external: false

services:

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    command: >
      sh -c "echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
             echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
             /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - ems_default

  mqtt-logger:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-logger
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: mosquitto_sub -h host.docker.internal -p 1883 -t "#" -v
    networks:
      - ems_default

  topology:
    build:
      context: ./topology
      dockerfile: Dockerfile
    image: topology:latest
    container_name: topology
    restart: always
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - topology_data:/app/data
    environment:
      - PORT=8081
      - MQTT_HOST=host.docker.internal
      - MQTT_PORT=1883
      - TOPOLOGY_PATH=/app/data/topology.yaml
    networks:
      - ems_default

  simulator-manager:
    build:
      context: ./simulator-manager
      dockerfile: Dockerfile
    image: simulator-manager:latest
    container_name: simulator-manager
    hostname: simulator-manager
    restart: always
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./simulator-manager/edges:/app/edges
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8080
      - DOCKER_NETWORK=ems_default
      - SOLAR_IMAGE=solar-simulator:latest
      - DIESEL_IMAGE=diesel-simulator:latest
      - ESS_IMAGE=ess-simulator:latest
      - LOAD_IMAGE=load-simulator:latest
      - MQTT_HOST=host.docker.internal
      - MQTT_PORT=1883
    networks:
      - ems_default

  # ── 아래 서비스들은 이미지 빌드 전용 ────────────────────────────────────────
  # up -d 시 이미지를 빌드한 뒤 즉시 종료 (restart: no)
  # simulator-manager가 동적으로 이 이미지들을 사용함

  solar-simulator:
    build:
      context: ./solar-simulator
      dockerfile: Dockerfile
    image: solar-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

  diesel-simulator:
    build:
      context: ./diesel-simulator
      dockerfile: Dockerfile
    image: diesel-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

  ess-simulator:
    build:
      context: ./ess-simulator
      dockerfile: Dockerfile
    image: ess-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

  load-simulator:
    build:
      context: ./load-simulator
      dockerfile: Dockerfile
    image: load-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

volumes:
  topology_data:
