# ================================================================
# EMS Edge Simulator - Docker Compose
#
# [사용법]
# 전체 실행:
#   docker compose up -d
#   docker compose --profile all up -d
#
# 특정 시뮬레이터만 실행:
#   docker compose --profile solar up -d      # 태양광만
#   docker compose --profile diesel up -d     # 디젤만
#   docker compose --profile solar --profile diesel up -d  # 둘 다
#
# 빌드 포함 실행 (코드 변경 후):
#   docker compose up -d --build
#
# 로그 확인 (MQTT 수신 메시지 실시간):
#   docker compose logs -f mqtt-logger
#
# [Edge 추가 방법]
# 동일 build 이미지를 새 서비스로 선언하고
# PLANT_ID / DEVICE_IDS 환경변수만 다르게 설정하면 됩니다.
# ================================================================

# ems_default 네트워크: EMS가 먼저 실행 중이면 external로 공유, 아니면 자체 생성
# EMS와 함께 실행할 경우: external: true 로 변경하고 EMS를 먼저 실행할 것
networks:
  ems_default:
    external: false

services:

  # ----------------------------------------------------------------
  # MQTT 브로커 (공유 인프라 - 항상 실행)
  # 외부 접근: localhost:1883 (MQTT 클라이언트 직접 연결 시)
  # ----------------------------------------------------------------
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    # 포트 노출 제거: EMS mosquitto가 1883을 이미 사용 중

    command: >
      sh -c "echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
             echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
             /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------
  # MQTT 메시지 전체 로거 (디버깅용 - 항상 실행)
  # 확인: docker compose logs -f mqtt-logger
  # ----------------------------------------------------------------
  mqtt-logger:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-logger
    restart: always
    depends_on:
      mqtt-broker:
        condition: service_healthy
    command: mosquitto_sub -h mqtt-broker -t "#" -v

  # ================================================================
  # SOLAR EDGE (태양광 시뮬레이터)
  # profile: solar
  #
  # DEVICE_IDS: 이 Edge가 관리할 장치 ID 목록 (comma 구분)
  #   - 1대: DEVICE_IDS=solar-01
  #   - 3대: DEVICE_IDS=solar-01,solar-02,solar-03
  #
  # Edge를 여러 개 띄우려면:
  #   이 블록을 복사 → 서비스명/container_name/PLANT_ID or DEVICE_IDS 변경
  # ================================================================

  # --- Solar Edge: PLANT-ALPHA ---
  # devices.yaml로 장치 관리 (hot-reload 지원)
  # 장치 추가/제거: simulator-manager/edges/solar-edge-alpha/devices.yaml 수정
  solar-edge-alpha:
    build:
      context: ./solar-simulator
      dockerfile: Dockerfile
    image: solar-simulator:latest
    container_name: solar-edge-alpha
    restart: always
    volumes:
      - ./simulator-manager/edges/solar-edge-alpha:/app/config
    networks:
      - ems_default
    depends_on:
      mqtt-broker:
        condition: service_healthy

  # ================================================================
  # DIESEL EDGE (디젤 발전기 시뮬레이터)
  # profile: diesel
  #
  # DEVICE_IDS: 이 Edge가 관리할 발전기 ID 목록 (comma 구분)
  #   - 1대: DEVICE_IDS=diesel-01
  #   - 2대: DEVICE_IDS=diesel-01,diesel-02
  # ================================================================

  # --- Diesel Edge: PLANT-ALPHA ---
  # devices.yaml로 장치 관리 (hot-reload 지원)
  # 장치 추가/제거: simulator-manager/edges/diesel-edge-alpha/devices.yaml 수정
  diesel-edge-alpha:
    build:
      context: ./diesel-simulator
      dockerfile: Dockerfile
    image: diesel-simulator:latest
    container_name: diesel-edge-alpha
    restart: always
    volumes:
      - ./simulator-manager/edges/diesel-edge-alpha:/app/config
    networks:
      - ems_default

  # ================================================================
  # ESS SIMULATOR (에너지 저장 장치 시뮬레이터)
  # ================================================================
  ess-simulator:
    build:
      context: ./ess-simulator
      dockerfile: Dockerfile
    image: ess-simulator:latest
    container_name: ess-simulator
    restart: always
    command: ["python", "main.py", "--no-cli", "--config", "/app/config/devices.yaml"]
    volumes:
      - ./simulator-manager/edges/ess-simulator:/app/config
    networks:
      - ems_default
    depends_on:
      mqtt-broker:
        condition: service_healthy

  load-simulator:
    build:
      context: ./load-simulator
      dockerfile: Dockerfile
    image: load-simulator:latest
    container_name: load-simulator
    restart: always
    command:
      [
        "python",
        "main.py",
        "--config",
        "/app/config/devices.yaml",
        "--scenario",
        "/app/config/scenario.yaml"
      ]
    volumes:
      - ./simulator-manager/edges/load-simulator:/app/config
    networks:
      - ems_default
    depends_on:
      mqtt-broker:
        condition: service_healthy

  # ================================================================
  # SIMULATOR MANAGER (Web UI for edge & device management)
  # 접속: http://localhost:8080
  # ================================================================
  simulator-manager:
    build:
      context: ./simulator-manager
      dockerfile: Dockerfile
    image: simulator-manager:latest
    container_name: simulator-manager
    hostname: simulator-manager
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./simulator-manager/edges:/app/edges
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8080
      - DOCKER_NETWORK=ems_default
      - SOLAR_IMAGE=solar-simulator:latest
      - DIESEL_IMAGE=diesel-simulator:latest
      - ESS_IMAGE=ess-simulator:latest
      - LOAD_IMAGE=load-simulator:latest
    networks:
      - ems_default

