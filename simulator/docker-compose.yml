# ================================================================
# EMS Edge Simulator - Docker Compose
#
# MQTT broker는 EMS 측 mosquitto를 사용한다 (MSA 원칙: 인프라 공유).
# 이 docker-compose는 MQTT broker를 제공하지 않으므로 사전에 EMS가
# 떠있어야 한다.
#
# 환경 분리:
#   .env (또는 환경변수)로 MQTT_HOST 지정
#     - 같은 PC 통합 테스트: MQTT_HOST=host.docker.internal (기본값)
#     - 운영/원격 EMS:        MQTT_HOST=<EMS 서버 IP/도메인>
# ================================================================

networks:
  ems_default:
    external: false

services:

  # 디버깅용: 모든 MQTT 토픽을 표준출력으로 흘려본다.
  # 활성화: docker compose --profile debug up -d
  mqtt-logger:
    profiles: ["debug"]
    image: eclipse-mosquitto:2.0
    container_name: mqtt-logger
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: mosquitto_sub -h ${MQTT_HOST:-host.docker.internal} -p ${MQTT_PORT:-1883} -t "#" -v
    networks:
      - ems_default

  topology:
    build:
      context: ./topology
      dockerfile: Dockerfile
    image: topology:latest
    container_name: topology
    restart: always
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - topology_data:/app/data
    environment:
      - PORT=8081
      - MQTT_HOST=${MQTT_HOST:-host.docker.internal}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - TOPOLOGY_PATH=/app/data/topology.yaml
    networks:
      - ems_default

  simulator-manager:
    build:
      context: ./simulator-manager
      dockerfile: Dockerfile
    image: simulator-manager:latest
    container_name: simulator-manager
    hostname: simulator-manager
    restart: always
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./simulator-manager/edges:/app/edges
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8080
      - DOCKER_NETWORK=ems_default
      - SOLAR_IMAGE=solar-simulator:latest
      - DIESEL_IMAGE=diesel-simulator:latest
      - ESS_IMAGE=ess-simulator:latest
      - LOAD_IMAGE=load-simulator:latest
      - MQTT_HOST=${MQTT_HOST:-host.docker.internal}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
    networks:
      - ems_default

  # ── 아래 서비스들은 이미지 빌드 전용 ────────────────────────────────────────
  # up -d 시 이미지를 빌드한 뒤 즉시 종료 (restart: no)
  # simulator-manager가 동적으로 이 이미지들을 사용함

  solar-simulator:
    build:
      context: ./solar-simulator
      dockerfile: Dockerfile
    image: solar-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

  diesel-simulator:
    build:
      context: ./diesel-simulator
      dockerfile: Dockerfile
    image: diesel-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

  ess-simulator:
    build:
      context: ./ess-simulator
      dockerfile: Dockerfile
    image: ess-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

  load-simulator:
    build:
      context: ./load-simulator
      dockerfile: Dockerfile
    image: load-simulator:latest
    restart: "no"
    entrypoint: ["sh", "-c", "exit 0"]

volumes:
  topology_data:
