<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topology Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; color: #e6edf3; }
    .plant-badge { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 2px 8px; font-size: 12px; color: #8b949e; }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    section { margin-bottom: 32px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: #8b949e; border-bottom: 1px solid #21262d; padding-bottom: 8px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .node-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; }
    .node-card .label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
    .node-card .value { font-size: 13px; color: #e6edf3; }
    .node-type { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-top: 6px; }
    .GENERATION { background: #1a3a1a; color: #3fb950; border: 1px solid #238636; }
    .STORAGE { background: #1a2a3a; color: #58a6ff; border: 1px solid #1f6feb; }
    .LOAD { background: #3a1a1a; color: #f85149; border: 1px solid #da3633; }
    .GRID { background: #2a2a1a; color: #e3b341; border: 1px solid #9e6a03; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: normal; border-bottom: 1px solid #21262d; }
    td { padding: 8px 12px; border-bottom: 1px solid #161b22; vertical-align: middle; }
    tr:hover td { background: #161b22; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
    .NORMAL { background: #1a3a1a; color: #3fb950; border: 1px solid #238636; }
    .FAULT  { background: #3a1a1a; color: #f85149; border: 1px solid #da3633; }
    .BLOCKED{ background: #3a2a1a; color: #e3b341; border: 1px solid #9e6a03; }
    .OPEN   { background: #3a1a1a; color: #f85149; border: 1px solid #da3633; }
    .CLOSED { background: #1a3a1a; color: #3fb950; border: 1px solid #238636; }
    .TRANSITIONING { background: #2a2a1a; color: #e3b341; border: 1px solid #9e6a03; }
    .UNKNOWN{ background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
    button:hover { background: #30363d; border-color: #8b949e; }
    button.danger  { border-color: #da3633; color: #f85149; }
    button.danger:hover  { background: #3a1a1a; }
    button.success { border-color: #238636; color: #3fb950; }
    button.success:hover { background: #1a3a1a; }
    .empty { color: #8b949e; font-size: 13px; padding: 16px 0; }
    .refresh-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 12px; color: #8b949e; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px 16px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .add-section { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .add-section h3 { font-size: 13px; color: #8b949e; margin-bottom: 12px; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-family: inherit; width: 160px; }
    input:focus { outline: none; border-color: #58a6ff; }
    label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>Topology Manager</h1>
    <span class="plant-badge" id="plant-id">—</span>
  </header>
  <main>
    <div class="refresh-bar"><div class="dot"></div><span id="last-updated">Connecting...</span></div>

    <section>
      <h2>Nodes</h2>
      <div class="grid" id="nodes-grid"><p class="empty">Loading...</p></div>
    </section>

    <section>
      <h2>Lines &amp; Switches</h2>
      <div class="add-section">
        <h3>Add Line</h3>
        <div class="form-row">
          <div><label>Line ID</label><input id="f-line-id" placeholder="line-solar02-ess01" /></div>
          <div><label>From Node</label><input id="f-from" placeholder="node-solar-02" /></div>
          <div><label>To Node</label><input id="f-to" placeholder="node-ess-01" /></div>
          <div><label>Switch ID (opt)</label><input id="f-sw-id" placeholder="sw-solar02-ess01" /></div>
          <div style="padding-bottom:1px"><button class="success" onclick="addLine()">Add</button></div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Line ID</th>
            <th>Route</th>
            <th>Status</th>
            <th>Switch</th>
            <th>SW Position</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="lines-tbody"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
      </table>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let _topology = null;

    function badge(cls, text) {
      return `<span class="status-badge ${cls}">${text}</span>`;
    }

    function renderNodes(nodes) {
      const g = document.getElementById('nodes-grid');
      if (!nodes || !nodes.length) { g.innerHTML = '<p class="empty">No nodes.</p>'; return; }
      g.innerHTML = nodes.map(n => `
        <div class="node-card">
          <div class="label">node_id</div>
          <div class="value">${n.node_id}</div>
          <div class="label" style="margin-top:8px">resource_id</div>
          <div class="value">${n.resource_id}</div>
          <span class="node-type ${n.node_type}">${n.node_type}</span>
        </div>`).join('');
    }

    function renderLines(lines) {
      const tb = document.getElementById('lines-tbody');
      if (!lines || !lines.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">No lines defined.</td></tr>'; return; }
      tb.innerHTML = lines.map(l => {
        const sw = l.switch || {};
        const lineId = l.line_id;
        const isFault = l.status === 'FAULT';
        const isBlocked = l.status === 'BLOCKED';
        const swOpen = sw.position === 'OPEN';
        return `<tr>
          <td>${lineId}</td>
          <td style="font-size:11px;color:#8b949e">${l.from_node_id} → ${l.to_node_id}</td>
          <td>${badge(l.status, l.status)}</td>
          <td style="font-size:11px">${sw.switch_id || '—'}</td>
          <td>${sw.switch_id ? badge(sw.position, sw.position) : '—'}</td>
          <td>
            <div class="btn-group">
              ${!isBlocked && !isFault ? `<button class="danger" onclick="isolateLine('${lineId}')">Isolate</button>` : ''}
              ${isBlocked || isFault ? `<button class="success" onclick="restoreLine('${lineId}')">Restore</button>` : ''}
              ${isFault ? '' : `<button class="danger" onclick="faultLine('${lineId}', true)">Inject Fault</button>`}
              ${isFault ? `<button class="success" onclick="faultLine('${lineId}', false)">Clear Fault</button>` : ''}
              ${sw.switch_id && !swOpen ? `<button onclick="switchOp('${sw.switch_id}', 'OPEN_SWITCH')">Open SW</button>` : ''}
              ${sw.switch_id && swOpen ? `<button class="success" onclick="switchOp('${sw.switch_id}', 'CLOSE_SWITCH')">Close SW</button>` : ''}
              <button class="danger" onclick="deleteLine('${lineId}')">Del</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    async function fetchTopology() {
      try {
        const res = await fetch('/api/topology');
        const data = await res.json();
        _topology = data;
        document.getElementById('plant-id').textContent = data.plant_id || '—';
        renderNodes(data.nodes || []);
        renderLines(data.lines || []);
        document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('last-updated').textContent = 'Error: ' + e.message;
      }
    }

    function showToast(msg, ok = true) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderColor = ok ? '#238636' : '#da3633';
      t.style.color = ok ? '#3fb950' : '#f85149';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function api(method, path, body) {
      try {
        const res = await fetch(path, {
          method,
          headers: {'Content-Type': 'application/json'},
          body: body ? JSON.stringify(body) : undefined
        });
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'Error', false); return null; }
        showToast(JSON.stringify(data), true);
        fetchTopology();
        return data;
      } catch (e) {
        showToast(e.message, false);
        return null;
      }
    }

    function gv(id) { return document.getElementById(id).value.trim(); }

    async function addLine() {
      const lineId = gv('f-line-id'), from = gv('f-from'), to = gv('f-to'), swId = gv('f-sw-id');
      if (!lineId || !from || !to) { showToast('line_id, from_node_id, to_node_id required', false); return; }
      const body = { line_id: lineId, from_node_id: from, to_node_id: to };
      if (swId) body.switch_id = swId;
      await api('POST', '/api/lines', body);
      ['f-line-id','f-from','f-to','f-sw-id'].forEach(id => document.getElementById(id).value = '');
    }

    async function isolateLine(id) { await api('PATCH', `/api/lines/${id}`, { command: 'ISOLATE_LINE' }); }
    async function restoreLine(id) { await api('PATCH', `/api/lines/${id}`, { command: 'RESTORE_LINE' }); }
    async function faultLine(id, fault) { await api('PATCH', `/api/lines/${id}`, { fault }); }
    async function switchOp(id, cmd) { await api('PATCH', `/api/switches/${id}`, { command: cmd }); }
    async function deleteLine(id) {
      if (!confirm(`Delete line "${id}"?`)) return;
      await api('DELETE', `/api/lines/${id}`);
    }

    fetchTopology();
    setInterval(fetchTopology, 3000);
  </script>
</body>
</html>
