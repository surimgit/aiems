# Control + AI EC2 (172.31.34.123) 전용 compose
# - redis 는 Ingestion EC2(172.31.45.48), postgres/timescaledb 는 DB EC2(172.31.44.52) 에 있음
# - 컨테이너 내부에서 `redis`/`postgres`/`timescaledb` 호스트명으로 접속해야 하므로 extra_hosts 로 사설 IP 매핑
services:
  # Jenkins deploy trigger
  control:
    build:
      context: ./ems/control
      args:
        PORT: 5003
    ports:
      - "${CONTROL_PORT:-5003}:5003"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    restart: always
    extra_hosts:
      - "redis:172.31.45.48"
      - "mqtt:172.31.45.48"
      - "postgres:172.31.44.52"
      - "timescaledb:172.31.44.52"
      - "state-processor:172.31.33.89"

  ai:
    build:
      context: .
      dockerfile: ems/ai/service/Dockerfile
    ports:
      - "${AI_PORT:-5004}:5004"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-1200}
      S305_SOLAR_MODEL_PATH: /app/ems/ai/models/solar_kpx_lightgbm/model.joblib
      S305_CAPACITY_FACTOR_MODEL_PATH: /app/ems/ai/models/kpx_5min_capacity_factor_lightgbm/model.joblib
    restart: always
    extra_hosts:
      - "redis:172.31.45.48"
      - "mqtt:172.31.45.48"
      - "postgres:172.31.44.52"
      - "timescaledb:172.31.44.52"
