services:
  control:
    build:
      context: ./ems/control
      args:
        PORT: 5003
    ports:
      - "5003:5003"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    restart: always

  ai-service:
    build:
      context: ./ems/ai-service
      args:
        PORT: 5004
    ports:
      - "5004:5004"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    restart: always
