worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ===== upstream 정의 (로컬용: docker-compose 서비스명) =====
    upstream monitoring {
        server monitoring:8000;
    }
    upstream ingestion {
        server ingestion:8001;
    }
    upstream forecast-ai {
        server forecast-ai:8002;
    }
    upstream report {
        server report:8003;
    }

    server {
        listen 80;
        server_name localhost;

        # ===== 공통 proxy 헤더 =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== HTTP API 라우팅 =====
        location /api/monitoring/ {
            proxy_pass http://monitoring;
        }
        location /api/control/ {
            proxy_pass http://monitoring;
        }
        location /api/ingestion/ {
            proxy_pass http://ingestion;
        }
        location /api/ai/ {
            proxy_pass http://forecast-ai;
        }
        location /api/report/ {
            proxy_pass http://report;
        }

        # ===== WebSocket 라우팅 (실시간 데이터) =====
        location /ws/ {
            proxy_pass http://ingestion;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ===== 정적 프론트엔드 =====
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
