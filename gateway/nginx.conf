worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ===== upstream 정의 (로컬용: docker-compose 서비스명) =====
    upstream ingestion {
        server ingestion:5001;
    }
    upstream state-processor {
        server state-processor:5002;
    }
    upstream control {
        server control:5003;
    }
    upstream ai-service {
        server ai-service:5004;
    }
    upstream db-writer {
        server db-writer:5005;
    }

    server {
        listen 80;
        server_name localhost;

        # ===== 공통 proxy 헤더 =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== HTTP API 라우팅 =====
        location /api/ingestion/ {
            proxy_pass http://ingestion;
        }
        location /api/state/ {
            proxy_pass http://state-processor;
        }
        location /api/control/ {
            proxy_pass http://control;
        }
        location /api/ai/ {
            proxy_pass http://ai-service;
        }
        location /api/db/ {
            proxy_pass http://db-writer;
        }

        # ===== WebSocket 라우팅 (실시간 데이터) =====
        location /ws/ {
            proxy_pass http://ingestion;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ===== 정적 프론트엔드 =====
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
