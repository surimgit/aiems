worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ===== Cloudflare 실제 클라이언트 IP 복구 =====
    # Cloudflare 가 프록시하면 nginx 가 받는 source IP 는 Cloudflare 의 IP
    # CF-Connecting-IP 헤더에 진짜 사용자 IP 가 담김
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ===== upstream 정의 (프로덕션: 각 서비스 EC2 의 사설 IP) =====
    # Ingestion EC2 (172.31.45.48)
    upstream ingestion {
        server 172.31.45.48:5001;
    }

    # State + DB-Writer EC2 (172.31.33.89)
    upstream state-processor {
        server 172.31.33.89:5002;
    }
    upstream db-writer {
        server 172.31.33.89:5005;
    }

    # Control + AI EC2 (172.31.34.123)
    upstream control {
        server 172.31.34.123:5003;
    }
    upstream ai {
        server 172.31.34.123:5004;
    }

    # ===== 공통 proxy 헤더 (server 블록 외부에 한번만 정의) =====
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ===== HTTP (8080) - 내부 헬스체크 + HTTPS 리다이렉트 =====
    server {
        listen 8080;
        server_name _;

        # 헬스체크는 HTTP 로 그대로 (모니터링/내부 도구용)
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # nginx stub_status (Prometheus exporter 전용, 내부망만)
        location = /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
        }

        # 그 외 요청은 모두 HTTPS 로 강제 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== HTTPS (8443) - Cloudflare ↔ Origin =====
    server {
        listen 8443 ssl;
        http2 on;
        server_name power21.kr www.power21.kr;

        # Cloudflare Origin Certificate
        ssl_certificate     /etc/cloudflare/power21.kr.pem;
        ssl_certificate_key /etc/cloudflare/power21.kr.key;

        # SSL 설정
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ===== Healthcheck =====
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # ===== HTTP API 라우팅 =====
        location /api/ingestion/ {
            proxy_pass http://ingestion/;
        }
        location /api/state/ {
            proxy_pass http://state-processor/;
        }
        # /api/plants/ → state-processor (경로 보존: state-processor blueprint url_prefix="/api")
        location /api/plants/ {
            proxy_pass http://state-processor/api/plants/;
        }
        # /api/control/ → control (경로 보존: blueprint url_prefix="/api/control")
        location /api/control/ {
            proxy_pass http://control/api/control/;
        }
        # /api/ai/ → ai-service (경로 보존: blueprint url_prefix="/api/ai")
        location /api/ai/ {
            proxy_pass http://ai/api/ai/;
            proxy_connect_timeout 10s;
            proxy_send_timeout 500s;
            proxy_read_timeout 500s;
        }
        location /api/db/ {
            proxy_pass http://db-writer/;
        }

        # ===== WebSocket 라우팅 =====
        location /ws/ {
            proxy_pass http://ingestion;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ===== 정적 프론트엔드 =====
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
