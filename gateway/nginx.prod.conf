worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ===== upstream 정의 (프로덕션: 각 서비스 EC2 의 사설 IP) =====
    # Ingestion EC2 (172.31.45.48)
    upstream ingestion {
        server 172.31.45.48:5001;
    }

    # State + DB-Writer EC2 (172.31.33.89)
    upstream state-processor {
        server 172.31.33.89:5002;
    }
    upstream db-writer {
        server 172.31.33.89:5005;
    }

    # Control + AI EC2 (172.31.34.123)
    upstream control {
        server 172.31.34.123:5003;
    }
    upstream ai-service {
        server 172.31.34.123:5004;
    }

    server {
        # SSAFY 포트 정책상 Gateway 는 8080 으로 노출
        # Cloudflare / 포트포워딩으로 80/443 에 매핑
        listen 8080;
        server_name _;

        # ===== 공통 proxy 헤더 =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== Healthcheck =====
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # ===== HTTP API 라우팅 =====
        location /api/ingestion/ {
            proxy_pass http://ingestion/;
        }
        location /api/state/ {
            proxy_pass http://state-processor/;
        }
        location /api/control/ {
            proxy_pass http://control/;
        }
        location /api/ai/ {
            proxy_pass http://ai-service/;
        }
        location /api/db/ {
            proxy_pass http://db-writer/;
        }

        # ===== WebSocket 라우팅 (실시간 데이터) =====
        location /ws/ {
            proxy_pass http://ingestion;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ===== 정적 프론트엔드 =====
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
