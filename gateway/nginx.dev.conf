worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ===== upstream 정의 (dev: 각 서비스 EC2 의 사설 IP, dev 포트) =====
    # Ingestion EC2 (172.31.45.48)
    upstream ingestion {
        server 172.31.45.48:6001;
    }

    # State + DB-Writer EC2 (172.31.33.89)
    upstream state-processor {
        server 172.31.33.89:6002;
    }
    upstream db-writer {
        server 172.31.33.89:6005;
    }

    # Control + AI EC2 (172.31.34.123)
    upstream control {
        server 172.31.34.123:6003;
    }
    upstream ai {
        server 172.31.34.123:6004;
    }

    server {
        # dev 환경: 컨테이너 내부 8080, 외부 9080 (GATEWAY_HTTP_PORT=9080)
        listen 8080;
        server_name _;

        # ===== 공통 proxy 헤더 =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== Healthcheck =====
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # ===== HTTP API 라우팅 =====
        location /api/ingestion/ {
            proxy_pass http://ingestion/;
        }
        location /api/state/ {
            proxy_pass http://state-processor/;
        }
        location /api/control/ {
            proxy_pass http://control/;
        }
        location /api/ai/ {
            proxy_pass http://ai/;
        }
        location /api/db/ {
            proxy_pass http://db-writer/;
        }

        # ===== WebSocket 라우팅 =====
        location /ws/ {
            proxy_pass http://ingestion;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ===== 정적 프론트엔드 =====
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
