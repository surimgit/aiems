services:
  gateway:
    build:
      context: ./gateway
    ports:
      # 로컬 http://localhost → 컨테이너 내부 nginx(8080) 로 포워딩
      - "80:8080"
    depends_on:
      ingestion:
        condition: service_healthy
      state-processor:
        condition: service_healthy
      control:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  stream-init:
    build:
      context: ./infra
      dockerfile: Dockerfile.stream-init
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  ingestion:
    build:
      context: ./ems/ingestion
      args:
        PORT: 5001
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    depends_on:
      stream-init:
        condition: service_completed_successfully
      mqtt:
        condition: service_started

  state-processor:
    build:
      context: ./ems/state-processor
      args:
        PORT: 5002
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    depends_on:
      postgres:
        condition: service_healthy
      stream-init:
        condition: service_completed_successfully

  control:
    build:
      context: ./ems/control
      args:
        PORT: 5003
    ports:
      - "5003:5003"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    depends_on:
      postgres:
        condition: service_healthy
      stream-init:
        condition: service_completed_successfully

  ai-service:
    build:
      context: ./ems/ai-service
      args:
        PORT: 5004
    ports:
      - "5004:5004"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    depends_on:
      postgres:
        condition: service_healthy
      stream-init:
        condition: service_completed_successfully

  db-writer:
    build:
      context: ./ems/db-writer
      args:
        PORT: 5005
    ports:
      - "5005:5005"
    env_file: .env
    environment:
      FLASK_APP: app.main:app
    depends_on:
      timescaledb:
        condition: service_healthy
      stream-init:
        condition: service_completed_successfully

  timescaledb:
    image: timescale/timescaledb:2.15.3-pg15
    restart: always
    environment:
      POSTGRES_PASSWORD: ${TIMESCALE_ROOT_PASSWORD}
      TIMESCALE_DB: ${TIMESCALE_DB}
      TIMESCALE_USER: ${TIMESCALE_USER}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/init_timescale.sh:/docker-entrypoint-initdb.d/init_timescale.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15.5
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      STATE_DB: ${STATE_DB}
      STATE_USER: ${STATE_USER}
      STATE_PASSWORD: ${STATE_PASSWORD}
      AI_DB: ${AI_DB}
      AI_USER: ${AI_USER}
      AI_PASSWORD: ${AI_PASSWORD}
      CONTROL_DB: ${CONTROL_DB}
      CONTROL_USER: ${CONTROL_USER}
      CONTROL_PASSWORD: ${CONTROL_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init_postgres.sh:/docker-entrypoint-initdb.d/init_postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0.18
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    entrypoint: ["/bin/sh", "/mosquitto/config/entrypoint.sh"]
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/acl.template:/mosquitto/config/acl.template:ro
      - ./infra/mosquitto/entrypoint.sh:/mosquitto/config/entrypoint.sh:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

volumes:
  timescale_data:
  postgres_data:
  redis_data:
  mqtt_data:
  mqtt_log:
