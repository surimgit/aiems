services:
  gateway:
    build:
      context: ./gateway
    ports:
      - "80:80"
    depends_on:
      ingestion:
        condition: service_healthy
      state-processor:
        condition: service_healthy
      control:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  ingestion:
    build:
      context: ./ems/ingestion
      args:
        PORT: 5001
    ports:
      - "5001:5001"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started

  state-processor:
    build:
      context: ./ems/state-processor
      args:
        PORT: 5002
    ports:
      - "5002:5002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  control:
    build:
      context: ./ems/control
      args:
        PORT: 5003
    ports:
      - "5003:5003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ./ems/ai-service
      args:
        PORT: 5004
    ports:
      - "5004:5004"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  db-writer:
    build:
      context: ./ems/db-writer
      args:
        PORT: 5005
    ports:
      - "5005:5005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

volumes:
  pg_data:
  redis_data:
  mqtt_data:
  mqtt_log:
