seed: 42
device: cuda

data:
  train_path: ems/ai/data/processed/train.csv
  val_path: ems/ai/data/processed/val.csv
  target_column: future_net_power_kw
  feature_columns:
    - load_kw
    - generation_kw
    - ess_soc
    - ess_p_kw
    - net_power_kw
    - event_count
  file_format: csv

training:
  epochs: 20
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0

model:
  hidden_dims:
    - 64
    - 32
  dropout: 0.1

output:
  checkpoint_dir: ems/ai/checkpoints
  log_dir: ems/ai/logs
  run_name: baseline_mlp
  save_best_only: false
