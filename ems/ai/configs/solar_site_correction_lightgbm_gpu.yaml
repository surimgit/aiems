seed: 42

data:
  # This file is created later from forecast_actual_log + weather features.
  train_path: "${S305_AI_DATA_ROOT}/processed/splits/solar_site_correction_train.csv"
  val_path: "${S305_AI_DATA_ROOT}/processed/splits/solar_site_correction_val.csv"
  file_format: csv
  site_column: site_id
  baseline_column: predicted_solar_kw_baseline
  actual_column: actual_solar_kw
  target_column: correction_ratio
  feature_columns:
    - predicted_solar_kw_baseline
    - ALLSKY_SFC_SW_DWN
    - CLRSKY_SFC_SW_DWN
    - T2M
    - RH2M
    - WS10M
    - PRECTOTCORR
    - clear_sky_ratio
    - temperature_factor
    - installed_capacity_kw
    - hour_of_day_sin
    - hour_of_day_cos
    - day_of_year_sin
    - day_of_year_cos

target:
  min_baseline_kw: 1.0
  min_ratio: 0.0
  max_ratio: 2.0

model:
  objective: regression
  n_estimators: 800
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.0
  reg_lambda: 0.1
  random_state: 42
  n_jobs: -1
  early_stopping_rounds: 50

output:
  artifact_dir: "${S305_AI_OUTPUT_ROOT}/artifacts"
  log_dir: "${S305_AI_OUTPUT_ROOT}/logs"
  run_name: solar_site_correction_lightgbm
