source: kma_vilage_forecast

request:
  auth_env: KMA_AUTH_KEY
  env_file: ems/ai/.env
  timeout_seconds: 30
  sleep_seconds: 0.5
  retries: 3
  endpoints:
    xy_lonlat: https://apihub.kma.go.kr/api/typ01/cgi-bin/url/nph-dfs_xy_lonlat
    ultra_srt_ncst: https://apihub.kma.go.kr/api/typ01/cgi-bin/url/nph-dfs_odam_grd
    ultra_srt_fcst: https://apihub.kma.go.kr/api/typ01/cgi-bin/url/nph-dfs_vsrt_grd
    vilage_fcst: https://apihub.kma.go.kr/api/typ01/cgi-bin/url/nph-dfs_shrt_grd

collection:
  tmfc_ultra: "202604301000"
  tmef_ultra: "2026043011"
  tmfc_short: "2026043008"
  tmef_short: "2026043011"
  variables:
    ultra_srt_ncst: [T1H, RN1, UUU, VVV, VEC, WSD, PTY, REH]
    ultra_srt_fcst: [T1H, RN1, UUU, VVV, VEC, WSD, SKY, PTY, LGT, REH]
    vilage_fcst: [TMP, POP, PCP, REH, SKY, PTY, WSD, VEC, UUU, VVV]

