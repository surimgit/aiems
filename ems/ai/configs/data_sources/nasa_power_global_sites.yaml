source: nasa_power_global_sites

range:
  start_date: "2025-01-01"
  end_date: "2025-12-31"

request:
  provider: auto
  base_url: "https://power.larc.nasa.gov/api/temporal/hourly/point"
  community: re
  time_standard: utc
  format: JSON
  timeout_seconds: 60
  retries: 3
  sleep_seconds: 1.0
  parameters:
    - ALLSKY_SFC_SW_DWN
    - CLRSKY_SFC_SW_DWN
    - T2M
    - RH2M
    - WS10M
    - PRECTOTCORR

s3:
  zarr_url: "https://nasa-power.s3.amazonaws.com/syn1deg/temporal/power_syn1deg_hourly_temporal_utc.zarr"

storage:
  backend: local_filesystem
  raw_root: "G:/내 드라이브/s305-ai-data/raw/weather/nasa_power_global"
  processed_root: "G:/내 드라이브/s305-ai-data/processed/weather/nasa_power_global"
  save_raw_response: true
  save_hourly_csv: true
  skip_existing: true

database:
  enabled: true
  auto_migrate: true
  load_method: docker_exec
  docker_container: timescaledb
  use_env_overrides: false
  driver: postgresql
  host: 127.0.0.1
  port: 5432
  database: emsdb
  user: ems
  password: ems1234
  schema: public
  env:
    host: AI_DB_HOST
    port: AI_DB_PORT
    database: AI_DB_NAME
    user: AI_DB_USER
    password: AI_DB_PASSWORD

object_storage:
  enabled: false
  provider: s3
  bucket: ""
  prefix: "s305-ai-data/weather/nasa_power_global"
  region: "ap-northeast-2"
  env:
    bucket: AI_S3_BUCKET
    region: AWS_REGION

pv_baseline:
  system_efficiency: 0.85
  reference_irradiance_w_m2: 1000.0
  reference_temperature_c: 25.0
  temperature_coefficient_per_c: -0.004
  min_temperature_factor: 0.70
  max_temperature_factor: 1.10

sites:
  - site_id: KR_SEOUL
    country: KR
    timezone: Asia/Seoul
    latitude: 37.5665
    longitude: 126.9780
    installed_capacity_kw: 100.0
    panel_tilt: 30.0
    panel_azimuth: 180.0

  - site_id: US_ARIZONA
    country: US
    timezone: America/Phoenix
    latitude: 33.4484
    longitude: -112.0740
    installed_capacity_kw: 100.0
    panel_tilt: 30.0
    panel_azimuth: 180.0

  - site_id: DE_BERLIN
    country: DE
    timezone: Europe/Berlin
    latitude: 52.5200
    longitude: 13.4050
    installed_capacity_kw: 100.0
    panel_tilt: 35.0
    panel_azimuth: 180.0

  - site_id: AE_DUBAI
    country: AE
    timezone: Asia/Dubai
    latitude: 25.2048
    longitude: 55.2708
    installed_capacity_kw: 100.0
    panel_tilt: 25.0
    panel_azimuth: 180.0

  - site_id: AU_SYDNEY
    country: AU
    timezone: Australia/Sydney
    latitude: -33.8688
    longitude: 151.2093
    installed_capacity_kw: 100.0
    panel_tilt: 30.0
    panel_azimuth: 0.0
