seed: 42

data:
  train_path: "ems/ai/data/processed/kpx_5min_capacity_factor/kpx_5min_capacity_factor_train.csv"
  val_path: "ems/ai/data/processed/kpx_5min_capacity_factor/kpx_5min_capacity_factor_val.csv"
  target_column: future_capacity_factor
  feature_columns:
    - past_capacity_factor
    - past_capacity_factor_lag_1
    - past_capacity_factor_lag_24
    - rolling_mean_cf_3h
    - rolling_mean_cf_24h
    - solar_elevation_mid
    - is_daylight
    - hour_of_day_sin
    - hour_of_day_cos
    - day_of_year_sin
    - day_of_year_cos
  file_format: csv

model:
  objective: regression
  n_estimators: 1000
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.0
  reg_lambda: 0.1
  random_state: 42
  n_jobs: -1
  early_stopping_rounds: 50

output:
  artifact_dir: "ems/ai/outputs/artifacts"
  log_dir: "ems/ai/outputs/logs"
  run_name: kpx_5min_capacity_factor_lightgbm
