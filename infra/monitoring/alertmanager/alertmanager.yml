# Alertmanager → Mattermost (Slack 호환 incoming webhook)
global:
  resolve_timeout: 5m

route:
  receiver: mattermost
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: mattermost
    slack_configs:
      - api_url: "https://meeting.ssafy.com/hooks/coo7q6s76fdi8f5kxdi1rf8bce"
        channel: "#alerts"
        send_resolved: true
        username: "EMS Alertmanager"
        icon_emoji: ":rotating_light:"
        title: |-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
        text: |-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          - severity: `{{ .Labels.severity }}`
          - instance: `{{ .Labels.instance }}`
          - started: {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}
          {{ end }}

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, instance]
