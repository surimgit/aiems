# Prometheus 스크레이프 설정 (Tailscale 100.x 대역으로 통신)
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ems

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ===== Node Exporter (호스트 메트릭) =====
  - job_name: node
    static_configs:
      - targets: ["100.124.158.59:9100"]
        labels: { instance: cicd, role: cicd }
      - targets: ["100.95.93.41:9100"]
        labels: { instance: gateway, role: gateway }
      - targets: ["100.126.227.114:9100"]
        labels: { instance: ingestion, role: ingestion }
      - targets: ["100.76.217.5:9100"]
        labels: { instance: state, role: state }
      - targets: ["100.109.88.92:9100"]
        labels: { instance: control, role: control }
      - targets: ["100.98.2.82:9100"]
        labels: { instance: db, role: db }

  # ===== cAdvisor (컨테이너 메트릭) =====
  - job_name: cadvisor
    static_configs:
      - targets: ["100.95.93.41:8085"]
        labels: { instance: gateway }
      - targets: ["100.126.227.114:8085"]
        labels: { instance: ingestion }
      - targets: ["100.76.217.5:8085"]
        labels: { instance: state }
      - targets: ["100.109.88.92:8085"]
        labels: { instance: control }
      - targets: ["100.98.2.82:8085"]
        labels: { instance: db }
      - targets: ["100.124.158.59:8085"]
        labels: { instance: cicd }

  # ===== Postgres / TimescaleDB =====
  - job_name: postgres
    static_configs:
      - targets: ["100.98.2.82:9187"]

  # ===== Redis (ingestion EC2에 위치) =====
  - job_name: redis
    static_configs:
      - targets: ["100.126.227.114:9121"]

  # ===== Nginx (gateway EC2) =====
  - job_name: nginx
    static_configs:
      - targets: ["100.95.93.41:9113"]

  # ===== MQTT (ingestion EC2에 mosquitto 위치) =====
  - job_name: mqtt
    static_configs:
      - targets: ["100.126.227.114:9234"]

  # ===== EMS 앱 메트릭 (/metrics) =====
  - job_name: ems-ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["100.126.227.114:5001"]
  - job_name: ems-state
    metrics_path: /metrics
    static_configs:
      - targets: ["100.76.217.5:5002"]
  - job_name: ems-control
    metrics_path: /metrics
    static_configs:
      - targets: ["100.109.88.92:5003"]
  - job_name: ems-ai
    metrics_path: /metrics
    static_configs:
      - targets: ["100.109.88.92:5004"]
  - job_name: ems-db-writer
    metrics_path: /metrics
    static_configs:
      - targets: ["100.76.217.5:5005"]
