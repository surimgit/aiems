# CI/CD 서버 (SSAFY 기본지급 Lightsail) 전용 compose
# - Jenkins + SonarQube + SonarQube DB(PostgreSQL)
# - 배포 대상 EMS 서비스들과는 완전히 분리된 스택
#
# 실행:
#   docker compose -f docker-compose.cicd.yml up -d
#
# Jenkins 초기 관리자 비밀번호:
#   docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
#
# SonarQube 초기 ID/PW:
#   admin / admin (첫 로그인 시 변경 강제)
services:
  jenkins:
    build:
      context: ./infra/jenkins
    image: ems-jenkins:lts-jdk17
    container_name: jenkins
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    user: root
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: "-Duser.timezone=Asia/Seoul"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - cicd

  # ===== SonarQube =====
  # Community Edition: Python, JS/TS, Vue 분석 무료 지원
  # 첫 기동 시 1~2분 소요 (Elasticsearch 초기화)
  sonarqube:
    image: sonarqube:10.6-community
    container_name: sonarqube
    restart: always
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      # SSAFY 정책: 외부 노출 8000~8999 → 8000 사용
      - "8000:9000"
    environment:
      TZ: Asia/Seoul
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube_pass_change_me
      # Elasticsearch 메모리 (낮은 사양 EC2 대응)
      SONAR_SEARCH_JAVAADDITIONALOPTS: "-Xms512m -Xmx512m"
      SONAR_WEB_JAVAADDITIONALOPTS: "-Xms512m -Xmx1g"
      SONAR_CE_JAVAADDITIONALOPTS: "-Xms512m -Xmx1g"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 4096
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - cicd

  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    restart: always
    environment:
      TZ: Asia/Seoul
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube_pass_change_me
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cicd

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db_data:

networks:
  cicd:
    driver: bridge
