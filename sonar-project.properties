# ================================================================
# SonarQube 분석 설정 - EMS 모노레포
# ================================================================
# - Python 5개 서비스 + Vue/TS 프론트엔드 통합 분석
# - 분석 대상: ems/, frontend/src/
# - 분석 제외: 빌드 산출물, 외부 라이브러리, 시뮬레이터(별도 프로젝트)
# ================================================================
sonar.projectKey=s14p31s305
sonar.projectName=EMS Microgrid Monitoring
sonar.projectVersion=1.0

# 분석 대상 소스 (콤마 구분)
sonar.sources=ems/ingestion/app,ems/state-processor/app,ems/control/app,ems/ai/app,ems/db-writer/app,frontend/src

# 분석 제외 (glob 패턴)
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/migrations/**,\
  **/venv/**,\
  **/.venv/**,\
  frontend/dist/**,\
  frontend/node_modules/**,\
  simulator/**,\
  infra/**,\
  gateway/**

# 테스트 코드 위치 (현재 거의 없지만 향후 대비)
sonar.tests=
sonar.test.exclusions=**/test_*.py,**/*_test.py,**/*.spec.ts,**/*.test.ts

# 인코딩
sonar.sourceEncoding=UTF-8

# Python 설정
sonar.python.version=3.11

# JavaScript/TypeScript 설정
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx,.vue

# 중복 분석 제외 (거짓 양성 줄이기)
sonar.cpd.exclusions=**/*.spec.ts,**/test_*.py
