# Gateway EC2 (172.31.37.96) 전용 compose
# - SSAFY 포트 정책: 외부 노출은 8000-8999, 9000-9999 범위만 허용
# - prod: GATEWAY_HTTP_PORT=8080, GATEWAY_HTTPS_PORT=8443, NGINX_CONF=nginx.prod.conf
# - dev : GATEWAY_HTTP_PORT=9080, GATEWAY_HTTPS_PORT=9443, NGINX_CONF=nginx.dev.conf
# - 환경별 .env 파일로 prod/dev 분리 (다른 서비스와 동일한 패턴)
services:
  gateway:
    build:
      context: ./gateway
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
      - "${GATEWAY_HTTPS_PORT:-8443}:8443"
    restart: always
    volumes:
      - ./gateway/${NGINX_CONF:-nginx.prod.conf}:/etc/nginx/nginx.conf:ro
      - ${CLOUDFLARE_CERT_DIR:-/etc/cloudflare}:/etc/cloudflare:ro
      - ./frontend-dist:/var/www/html:ro
